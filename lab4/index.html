<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна №4: 3D Анімація</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Космічна модель: Земля та Місяць</h1>
        <p>Реалістична 3D-анімація за допомогою CSS3</p>
    </header>

    <div class="animation-container">
        <div class="stars" id="stars"></div>
        
        <div class="space">
            <!-- Орбіта Місяця -->
            <div class="moon-orbit">
                <!-- Місяць -->
                <div class="moon"></div>
            </div>
            
            <!-- Земля -->
            <div class="earth"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
